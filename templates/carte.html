{% extends "base.html" %}
{% block titre %}Carte{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
{% endblock %}

{% block contenu %}

<h2>Carte des densités par département</h2>

<form id="form-carte">
    <label for="profession">Profession</label>
    <select name="profession_id" id="profession" required>
        <option value="">-- Choisir --</option>
        {% for p in professions %}
        <option value="{{ p.id }}">{{ p.libelle }}</option>
        {% endfor %}
    </select>

    <label for="annee">Année</label>
    <select name="annee" id="annee">
        {% for a in range(2023, 2014, -1) %}
        <option value="{{ a }}">{{ a }}</option>
        {% endfor %}
    </select>

    <button type="submit">Afficher la carte</button>
</form>

<p id="carte-statut" style="color: #666; margin-top: 10px;"></p>

<div id="map" style="height:600px; margin-top: 15px;"></div>

{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="{{ url_for('static', filename='js/carte.js') }}"></script>
{% endblock %}
